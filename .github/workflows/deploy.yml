name: Deploy to laptop

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Pull latest
        run: git -C C:\Users\Peter\coderepo\calendar-bot pull origin main

      - name: Restart bot
        run: |
          # Kill existing bot process if running
          Get-Process -Name python -ErrorAction SilentlyContinue | 
            Where-Object { $_.CommandLine -like '*bot.py*' } | 
            Stop-Process -Force
          
          # Start test bot in background, output to log
          Start-Process python -ArgumentList "C:\Users\Peter\coderepo\calendar-bot\bot.py --env .env.test --db db\calendar_bot_test.db --log logs\bot_test.log" `
            -WorkingDirectory "C:\Users\Peter\coderepo\calendar-bot" `
            -WindowStyle Hidden `
            -RedirectStandardOutput "C:\Users\Peter\coderepoo\calendar-bot\logs\bot-test_stdout.log" `
            -RedirectStandardError "C:\Users\Peter\coderepoo\logs\bot-test_err.log"